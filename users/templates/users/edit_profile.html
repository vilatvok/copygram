{% extends "base.html" %}
{% load bootstrap5 %}
{% block title %}Edit{% endblock title %}

{% block content %}
    <form method="post" enctype='multipart/form-data'> 
        {% csrf_token %}
        {% bootstrap_form form %}
        <button class="btn btn-primary">Save</button>
        <a class="btn btn-primary" href="{% url 'users:change_password' %}">Change password</a>
        <a class="btn btn-primary" href="{% url 'users:enable_fa' %}">Enable 2fa</a>
        <a class="btn btn-primary" href="{% url 'users:disable_fa' %}">Disable 2fa</a>
    </form>
{% endblock content %}
