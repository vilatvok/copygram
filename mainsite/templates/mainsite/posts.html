{% extends "base.html" %}
{% load bootstrap5 %}

{% block title %}Posts{% endblock title %}

{% block content %}
    <div class="row row-cols-1 row-cols-md-5 g-4">
        {% for post in posts %}
            <div class="col">
                <div class="card h-100">
                    <a href="{{ post.get_absolute_url }}">
                        <img class="card-img-top" src="{{ post.photo.url }}" alt="Card image cap" height="225">
                    </a>
                    <div class="card-body bg-dark">
                        <a href="{% url 'users:profile' post.owner.id %}"><p class="card-text">{{ post.owner.username }}</p></a>
                        <p class="card-text text-light"><small class="text-muted">{{ post.description }}
                        {% for tag in post.tags.all %}
                            <a href="{% url 'mainsite:tags' tag.id %}"><small class="text-muted">#{{ tag.name }}</small></a>
                        {% endfor %}
                        </small>
                        </p>
                        <p class="card-text"><small class="text-muted">{{ post.date }}</small></p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
